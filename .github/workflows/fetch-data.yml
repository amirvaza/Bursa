name: Fetch Market Data

on:
  schedule:
    - cron: '30 16 * * 1-5'  # 16:30 UTC = 18:30 Israel time, 1h after TASE closes
  workflow_dispatch:          # allow manual trigger from GitHub Actions tab

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch TASE market data from Yahoo Finance
        run: |
          node -e "
          const fs = require('fs');

          const symbols = JSON.parse(fs.readFileSync('stocks.json', 'utf8')).symbols;

          async function fetchSymbol(symbol) {
            const url = 'https://query1.finance.yahoo.com/v8/finance/chart/' + symbol + '?range=10d&interval=1d';
            try {
              const res = await fetch(url, {
                headers: { 'User-Agent': 'Mozilla/5.0', 'Accept': 'application/json' }
              });
              if (!res.ok) { console.log('SKIP', symbol, res.status); return null; }
              const json = await res.json();
              const result = json?.chart?.result?.[0];
              if (!result) return null;
              const timestamps = result.timestamp ?? [];
              const quote = result.indicators?.quote?.[0] ?? {};
              const closes = quote.close ?? [];
              const volumes = quote.volume ?? [];
              const days = [];
              for (let i = 0; i < timestamps.length; i++) {
                if (closes[i] == null || volumes[i] == null) continue;
                const date = new Date(timestamps[i] * 1000).toISOString().slice(0, 10);
                days.push({ date, close: closes[i], volume: volumes[i] });
              }
              return days.length > 0 ? { symbol, days } : null;
            } catch (e) {
              console.log('SKIP', symbol, e.message);
              return null;
            }
          }

          async function main() {
            const results = await Promise.all(symbols.map(fetchSymbol));
            const all = results.filter(Boolean);
            fs.mkdirSync('data', { recursive: true });
            fs.writeFileSync('data/latest.json', JSON.stringify({
              fetched_at: new Date().toISOString(),
              stocks: all
            }));
            console.log('Wrote ' + all.length + ' stocks to data/latest.json');
          }

          main().catch(e => { console.error(e); process.exit(1); });
          "

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          git diff --staged --quiet || git commit -m "data: market snapshot $(date -u +%Y-%m-%d)"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
