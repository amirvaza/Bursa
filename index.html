<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TASE Stock Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1>TASE Stock Tracker</h1>
  <p class="subtitle">Tel Aviv Stock Exchange · sorted by average volume change</p>

  <div class="controls">
    <label for="view-select">View:</label>
    <select id="view-select">
      <option value="daily">Daily</option>
      <option value="weekly">Weekly (Thu)</option>
    </select>

    <label for="min-volume">Min. Volume:</label>
    <input id="min-volume" type="text" value="200,000" />

    <span class="badge" id="count">—</span>
    <span class="status" id="status"></span>
  </div>

  <div id="results"></div>

  <script src="fetcher.js?v=2"></script>
  <script src="filter.js?v=2"></script>
  <script src="renderer.js?v=2"></script>
  <script src="app.js?v=2"></script>
</body>
</html>
